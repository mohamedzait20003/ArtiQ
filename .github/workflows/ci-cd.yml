  build-fargate-image:
    name: Build & Push Fargate Image
    runs-on: ubuntu-latest
    needs: fargate-service

    steps:
    - uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ece30861/model_eval_fargate
        IMAGE_TAG: ${{ github.sha }}
      run: |
        cd backend/services/fargate-service
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  deploy-lambda:
    name: Deploy Lambda Service with API Gateway
    runs-on: ubuntu-latest
    needs: lambda-service
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/MONGODB-MIGRATION') && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install AWS SAM CLI
      run: |
        pip install aws-sam-cli
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-2
    
    - name: Build Lambda function
      run: |
        cd backend/services/lambda-service
        # Copy shared lib directory into lambda-service for packaging
        # Remove any existing lib symlink/directory first
        rm -rf ./lib
        cp -r ../../lib ./lib
        sam build --use-container
        # Clean up the copied lib after build (SAM already packaged it)
        rm -rf ./lib
    
    - name: Clean up orphaned Lambda resources
      run: |
        echo "Checking for orphaned Lambda functions..."
        # Try to delete the specific Lambda if it exists outside CloudFormation
        aws lambda delete-function --function-name ece461-model-registry-api --region us-east-2 2>/dev/null || echo "Lambda function does not exist or already managed by stack"
      continue-on-error: true
    
    - name: Check and delete failed stack
      run: |
        STACK_STATUS=$(aws cloudformation describe-stacks --stack-name ece461-model-registry-mongodb --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "DOES_NOT_EXIST")
        echo "Current stack status: $STACK_STATUS"
        
        if [ "$STACK_STATUS" = "DELETE_FAILED" ]; then
          echo "Stack is in DELETE_FAILED state. Attempting to skip deletion of failed resources..."
          # Get resources that failed to delete
          FAILED_RESOURCES=$(aws cloudformation describe-stack-resources --stack-name ece461-model-registry-mongodb --query "StackResources[?ResourceStatus=='DELETE_FAILED'].LogicalResourceId" --output text)
          echo "Failed resources: $FAILED_RESOURCES"
          
          # Try to delete with retain resources option
          aws cloudformation delete-stack --stack-name ece461-model-registry-mongodb --region us-east-2 --retain-resources $FAILED_RESOURCES || true
          sleep 10
          
          # Check if deletion succeeded
          NEW_STATUS=$(aws cloudformation describe-stacks --stack-name ece461-model-registry-mongodb --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          if [ "$NEW_STATUS" = "DOES_NOT_EXIST" ]; then
            echo "Stack deleted successfully."
          else
            echo "WARNING: Stack still exists. Manual intervention required via AWS Console."
            echo "Please delete the stack manually: https://us-east-2.console.aws.amazon.com/cloudformation"
            exit 1
          fi
        elif [ "$STACK_STATUS" = "ROLLBACK_COMPLETE" ] || [ "$STACK_STATUS" = "CREATE_FAILED" ]; then
          echo "Stack is in failed state ($STACK_STATUS). Deleting..."
          aws cloudformation delete-stack --stack-name ece461-model-registry-mongodb --region us-east-2
          echo "Waiting for stack deletion to complete..."
          aws cloudformation wait stack-delete-complete --stack-name ece461-model-registry-mongodb --region us-east-2
          echo "Stack deleted successfully."
        elif [ "$STACK_STATUS" != "DOES_NOT_EXIST" ]; then
          echo "Stack exists with status: $STACK_STATUS. Will attempt update."
        else
          echo "No existing stack found. Will create new stack."
        fi
      continue-on-error: false
    
    - name: Create SAM managed S3 bucket if needed
      run: |
        BUCKET_NAME="aws-sam-cli-managed-default-samclisourcebucket-zvcnsi0ylnwj"
        if aws s3 ls "s3://${BUCKET_NAME}" 2>/dev/null; then
          echo "S3 bucket ${BUCKET_NAME} already exists"
        else
          echo "Creating S3 bucket ${BUCKET_NAME}..."
          aws s3 mb "s3://${BUCKET_NAME}" --region us-east-2
          echo "S3 bucket created successfully"
        fi
      continue-on-error: true
    
    - name: Deploy Lambda with API Gateway
      env:
        MONGODB_URI: ${{ secrets.MONGODB_URI }}
      run: |
        cd backend/services/lambda-service
        sam deploy \
          --no-confirm-changeset \
          --no-fail-on-empty-changeset \
          --capabilities CAPABILITY_IAM \
          --region us-east-2 \
          --resolve-s3 \
          --parameter-overrides MongoDBUri="${MONGODB_URI}"
    
    - name: Get API Gateway URL
      run: |
        cd backend/services/lambda-service
        echo "API Gateway URL:"
        aws cloudformation describe-stacks --stack-name ece461-model-registry --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" --output text
