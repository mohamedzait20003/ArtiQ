  deploy-lambda:
    name: Deploy Lambda Service with API Gateway
    runs-on: ubuntu-latest
    needs: lambda-service
    if: github.event_name == 'pull_request'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install AWS SAM CLI
      run: |
        pip install aws-sam-cli
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-2
    
    - name: Build Lambda function
      run: |
        cd backend/services/lambda-service
        sam build --use-container
    
    - name: Check and delete failed stack
      run: |
        STACK_STATUS=$(aws cloudformation describe-stacks --stack-name ece461-model-registry-stack --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "DOES_NOT_EXIST")
        if [ "$STACK_STATUS" = "ROLLBACK_COMPLETE" ]; then
          echo "Stack is in ROLLBACK_COMPLETE state. Deleting..."
          aws cloudformation delete-stack --stack-name ece461-model-registry-stack --region us-east-2
          aws cloudformation wait stack-delete-complete --stack-name ece461-model-registry-stack --region us-east-2
          echo "Stack deleted successfully."
        else
          echo "Stack status: $STACK_STATUS"
        fi
      continue-on-error: true
    
    - name: Deploy Lambda with API Gateway
      run: |
        cd backend/services/lambda-service
        sam deploy \
          --no-confirm-changeset \
          --no-fail-on-empty-changeset \
          --capabilities CAPABILITY_IAM \
          --region us-east-2 \
          --resolve-s3
    
    - name: Get API Gateway URL
      run: |
        cd backend/services/lambda-service
        echo "API Gateway URL:"
        aws cloudformation describe-stacks --stack-name ece461-model-registry-stack --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" --output text
