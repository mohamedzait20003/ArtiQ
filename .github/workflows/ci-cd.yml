name: CI/CD Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  # Shared setup job to install dependencies once
  setup-backend:
    name: Setup Backend Dependencies
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Cache Python dependencies
      id: cache-pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8

  # Lambda service testing and linting
  lambda-service:
    name: Lambda Service - Test & Lint
    runs-on: ubuntu-latest
    needs: setup-backend
    env:
      AWS_REGION: us-east-2
      AWS_DEFAULT_REGION: us-east-2
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Restore Python dependencies cache
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8
    
    - name: Copy shared lib for testing
      run: |
        cd backend/services/lambda-service
        rm -rf ./lib
        cp -r ../../lib ./lib
    
    - name: Run tests
      env:
        PYTHONPATH: ${{ github.workspace }}/backend/services/lambda-service
        MONGODB_URI: mongodb://mock:27017/
        ARTIFACT_ENCRYPTION_KEY: ${{ secrets.ARTIFACT_ENCRYPTION_KEY }}
        PASSWORD_SALT: ${{ secrets.PASSWORD_SALT }}
      run: |
        cd backend/services/lambda-service
        python -m pytest -v --tb=short tests
    
    - name: Lint with flake8
      run: |
        cd backend/services/lambda-service
        flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Clean up copied lib
      if: always()
      run: |
        cd backend/services/lambda-service
        rm -rf ./lib

  # Fargate service linting
  fargate-service:
    name: Fargate Service - Lint
    runs-on: ubuntu-latest
    needs: setup-backend
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Restore Python dependencies cache
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8
    
    - name: Copy shared lib for linting
      run: |
        cd backend/services/fargate-service
        rm -rf ./lib
        cp -r ../../lib ./lib
    
    - name: Validate Fargate app structure
      run: |
        cd backend/services/fargate-service
        # Verify main.py exists and imports work
        python -c "import sys; sys.path.insert(0, '.'); from app.main import *" || echo "Warning: Import validation failed"
    
    - name: Lint with flake8
      run: |
        cd backend/services/fargate-service
        # Lint the main application code
        flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Clean up copied lib
      if: always()
      run: |
        cd backend/services/fargate-service
        rm -rf ./lib

  # Frontend build and test
  frontend:
    name: Frontend - Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    
    - name: Cache Node modules
      uses: actions/cache@v3
      with:
        path: frontend/node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('frontend/package.json') }}
        restore-keys: |
          ${{ runner.os }}-node-
    
    - name: Install dependencies
      run: |
        cd frontend
        npm install
    
    - name: Build Angular application
      run: |
        cd frontend
        npm run build
    
    - name: Run tests
      run: |
        cd frontend
        npm run test -- --watch=false --browsers=ChromeHeadless
    
    - name: Upload build artifacts
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/EVALUATION-FIX ')
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: frontend/dist
        retention-days: 1

  # Build and push Fargate Docker image to ECR
  build-fargate-image:
    name: Build & Push Fargate Image
    runs-on: ubuntu-latest
    needs: fargate-service
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/EVALUATION-FIX')
    
    steps:
    - uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Prepare Docker build context
      run: |
        cd backend/services/fargate-service
        # Copy shared lib to build context
        rm -rf ./lib
        cp -r ../../lib ./lib
    
    - name: Build, tag, and push image to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ece30861/model_eval_fargate
        IMAGE_TAG: ${{ github.sha }}
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        MONGODB_URI: ${{ secrets.MONGODB_URI }}
        ARTIFACT_ENCRYPTION_KEY: ${{ secrets.ARTIFACT_ENCRYPTION_KEY }}
      run: |
        cd backend/services/fargate-service
        docker build \
          --build-arg GH_TOKEN=$GH_TOKEN \
          --build-arg HF_TOKEN=$HF_TOKEN \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
    
    - name: Clean up copied lib
      if: always()
      run: |
        cd backend/services/fargate-service
        rm -rf ./lib

  # Deploy Lambda service using AWS SAM
  deploy-lambda:
    name: Deploy Lambda Service
    runs-on: ubuntu-latest
    needs: lambda-service
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/EVALUATION-FIX')
    env:
      AWS_REGION: us-east-2
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install AWS SAM CLI
      run: pip install aws-sam-cli
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-2
    
    - name: Build Lambda function
      run: |
        cd backend/services/lambda-service
        rm -rf ./lib
        cp -r ../../lib ./lib
        sam build --use-container
        rm -rf ./lib
    
    - name: Deploy Lambda with API Gateway
      env:
        MONGODB_URI: ${{ secrets.MONGODB_URI }}
        ARTIFACT_ENCRYPTION_KEY: ${{ secrets.ARTIFACT_ENCRYPTION_KEY }}
        CLUSTER_NAME: ${{ secrets.CLUSTER_NAME }}
        TASK_DEFINITION: ${{ secrets.TASK_DEFINITION }}
        CONTAINER_NAME: ${{ secrets.CONTAINER_NAME }}
        SUBNET_ID: ${{ secrets.SUBNET_ID }}
        SECURITY_GROUP: ${{ secrets.SECURITY_GROUP }}
        PASSWORD_SALT: ${{ secrets.PASSWORD_SALT }}
      run: |
        cd backend/services/lambda-service
        sam deploy \
          --no-confirm-changeset \
          --no-fail-on-empty-changeset \
          --capabilities CAPABILITY_IAM \
          --region us-east-2 \
          --resolve-s3 \
          --parameter-overrides MongoDBUri="${MONGODB_URI}" EncryptionKey="${ARTIFACT_ENCRYPTION_KEY}" ClusterName="${CLUSTER_NAME}" TaskDefinition="${TASK_DEFINITION}" ContainerName="${CONTAINER_NAME}" SubnetId="${SUBNET_ID}" SecurityGroup="${SECURITY_GROUP}" PasswordSalt="${PASSWORD_SALT}"
    
    - name: Get API Gateway URL
      run: |
        cd backend/services/lambda-service
        aws cloudformation describe-stacks \
          --stack-name ece461-model-registry \
          --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
          --output text

  # Deploy frontend to AWS Amplify
  deploy-frontend:
    name: Deploy Frontend to Amplify
    runs-on: ubuntu-latest
    needs: frontend
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/Evluation-Initial')
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: frontend-build
        path: frontend/dist
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-2
    
    - name: Trigger Amplify deployment
      env:
        AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
        AMPLIFY_BRANCH: ${{ github.ref_name }}
      run: |
        echo "Triggering Amplify deployment for app: $AMPLIFY_APP_ID on branch: $AMPLIFY_BRANCH"
        
        # Start a new deployment/build in Amplify
        BUILD_ID=$(aws amplify start-job \
          --app-id $AMPLIFY_APP_ID \
          --branch-name $AMPLIFY_BRANCH \
          --job-type RELEASE \
          --query 'jobSummary.jobId' \
          --output text)
        
        echo "Amplify build started with ID: $BUILD_ID"
        echo "Monitor the deployment at: https://console.aws.amazon.com/amplify/home?region=us-east-2#/$AMPLIFY_APP_ID/$AMPLIFY_BRANCH/$BUILD_ID"
        
        # Optional: Wait for deployment to complete
        echo "Waiting for deployment to complete..."
        aws amplify get-job \
          --app-id $AMPLIFY_APP_ID \
          --branch-name $AMPLIFY_BRANCH \
          --job-id $BUILD_ID \
          --query 'job.summary.status' \
          --output text
        
        echo "Frontend deployment triggered successfully!"
