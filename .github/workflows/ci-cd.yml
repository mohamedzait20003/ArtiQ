name: CI/CD Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  lambda-service:
    name: Lambda Service CI/CD
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-2
      AWS_DEFAULT_REGION: us-east-2

    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Cache Python dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-lambda-${{ hashFiles('backend/services/lambda-service/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-lambda-
    
    - name: Install dependencies
      run: |
        cd backend/services/lambda-service
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest
    
    - name: Run tests
      run: |
        cd backend/services/lambda-service
        # Set PYTHONPATH to current directory and run tests
        export PYTHONPATH="${PYTHONPATH}:$(pwd)"
        python -m pytest -v --tb=short tests
    
    - name: Lint with flake8
      run: |
        cd backend/services/lambda-service
        pip install flake8
        flake8 app routes --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 app routes --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  fargate-service:
    name: Fargate Service CI/CD
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Cache Python dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-fargate-${{ hashFiles('backend/services/fargate-service/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-fargate-
    
    - name: Install dependencies
      run: |
        cd backend/services/fargate-service
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Lint with flake8
      run: |
        cd backend/services/fargate-service
        pip install flake8
        flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

