AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ML Models Manager Lambda Service

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: python3.11

Resources:
  # Main FastAPI Lambda
  ModelRegistryAPI:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ece461-model-registry-api
      CodeUri: .
      Handler: src.main.handler
      Environment:
        Variables:
          ARTIFACT_CREATE_FUNCTION: !Ref ArtifactCreateFunction
      Policies:
        - DynamoDBCrudPolicy:
            TableName: Users
        - DynamoDBCrudPolicy:
            TableName: Artifacts
        - DynamoDBCrudPolicy:
            TableName: Roles
        - DynamoDBCrudPolicy:
            TableName: Permissions
        - DynamoDBCrudPolicy:
            TableName: Sessions
        - S3CrudPolicy:
            BucketName: artifacts-bucket
        - Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !GetAtt ArtifactCreateFunction.Arn
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY

  # Individual Lambda Functions
  ArtifactCreateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ece461-artifact-create
      CodeUri: .
      Handler: src.lambda_functions.artifact_create.lambda_handler

Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/"