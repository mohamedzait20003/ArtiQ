AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ML Models Manager Lambda Service

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: python3.11

Parameters:
  MongoDBUri:
    Type: String
    Description: MongoDB Atlas connection string
    NoEcho: true
    Default: ''
  EncryptionKey:
    Type: String
    Description: Encryption key for artifact IDs
    NoEcho: true
    Default: ''
  ClusterName:
    Type: String
    Description: ECS cluster name for Fargate tasks
    Default: 'ModelEvaluation'
  TaskDefinition:
    Type: String
    Description: ECS task definition for model evaluation
    Default: 'ModelEvalTask'
  ContainerName:
    Type: String
    Description: Container name in the task definition
    Default: 'ModelEvalContainer'
  SubnetId:
    Type: String
    Description: Subnet ID for Fargate tasks
    Default: 'subnet-066efdb18b16bdcf5'
  SecurityGroup:
    Type: String
    Description: Security group for Fargate tasks
    Default: 'sg-09e4b74cc268af399'
  PasswordSalt:
    Type: String
    Description: Password salt for hashing
    NoEcho: true
    Default: ''
  JWTSecretKey:
    Type: String
    Description: JWT secret key for token authentication
    NoEcho: true
    Default: ''

Resources:
  # Main FastAPI Lambda (handles all requests)
  ModelRegistryAPI:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: python3.11
    Properties:
      CodeUri: .
      Handler: app.main.handler
      Environment:
        Variables:
          MONGODB_URI: !Ref MongoDBUri
          ARTIFACTS_BUCKET: !Ref ArtifactsBucket
          ARTIFACT_ENCRYPTION_KEY: !Ref EncryptionKey
          ECS_CLUSTER_NAME: !Ref ClusterName
          ECS_TASK_DEFINITION: !Ref TaskDefinition
          ECS_CONTAINER_NAME: !Ref ContainerName
          ECS_SUBNET_ID: !Ref SubnetId
          ECS_SECURITY_GROUP: !Ref SecurityGroup
          PASSWORD_SALT: !Ref PasswordSalt
          JWT_SECRET_KEY: !Ref JWTSecretKey
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ArtifactsBucket
        - Statement:
          - Effect: Allow
            Action:
              - ecs:RunTask
              - ecs:DescribeTasks
            Resource: '*'
          - Effect: Allow
            Action:
              - iam:PassRole
            Resource: '*'
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY

  # S3 Bucket for Artifact Content Storage
  ArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "ece461-artifacts-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/"
  
  ArtifactsBucketName:
    Description: "S3 bucket name for artifact content"
    Value: !Ref ArtifactsBucket
    Export:
      Name: !Sub "${AWS::StackName}-ArtifactsBucket"