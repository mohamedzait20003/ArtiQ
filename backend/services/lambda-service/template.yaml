AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ML Models Manager Lambda Service

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: python3.11

Resources:
  # Lambda Layer for DocumentDB TLS Certificate
  DocumentDBCertLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: documentdb-cert
      Description: DocumentDB TLS certificate
      ContentUri: ./layers/documentdb-cert/
      CompatibleRuntimes:
        - python3.11
    Metadata:
      BuildMethod: makefile

  # Main FastAPI Lambda (handles all requests)
  ModelRegistryAPI:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ece461-model-registry-api
      CodeUri: .
      Handler: app.main.handler
      Environment:
        Variables:
          ARTIFACTS_BUCKET: !Ref ArtifactsBucket
          DOCUMENTDB_CONNECTION_STRING: mongodb://team25:YOUR_PASSWORD@docdb-ece30861-project.cluster-c5io6aokka3p.us-east-2.docdb.amazonaws.com:27017/?tls=true&tlsCAFile=/opt/global-bundle.pem&replicaSet=rs0&readPreference=secondaryPreferred&retryWrites=false
          DOCUMENTDB_DATABASE: trustworthy_registry
      Layers:
        - !Ref DocumentDBCertLayer
      Policies:
        - DynamoDBCrudPolicy:
            TableName: Users
        - DynamoDBCrudPolicy:
            TableName: !Ref ArtifactsTable
        - DynamoDBCrudPolicy:
            TableName: Roles
        - DynamoDBCrudPolicy:
            TableName: Permissions
        - DynamoDBCrudPolicy:
            TableName: Sessions
        - S3CrudPolicy:
            BucketName: !Ref ArtifactsBucket
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY

  # DynamoDB Table for Artifacts
  ArtifactsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Artifacts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  # S3 Bucket for Artifact Content Storage
  ArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "ece461-artifacts-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/"
  
  ArtifactsTableName:
    Description: "DynamoDB table name for artifacts"
    Value: !Ref ArtifactsTable
    Export:
      Name: !Sub "${AWS::StackName}-ArtifactsTable"
  
  ArtifactsBucketName:
    Description: "S3 bucket name for artifact content"
    Value: !Ref ArtifactsBucket
    Export:
      Name: !Sub "${AWS::StackName}-ArtifactsBucket"