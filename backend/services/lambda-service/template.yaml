AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ML Models Manager Lambda Service

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: python3.11

Parameters:
  MongoDBUri:
    Type: String
    Description: MongoDB Atlas connection string
    NoEcho: true
    Default: ''

Resources:
  # Main FastAPI Lambda (handles all requests)
  ModelRegistryAPI:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: app.main.handler
      Environment:
        Variables:
          MONGODB_URI: !Ref MongoDBUri
          ARTIFACTS_BUCKET: !Ref ArtifactsBucket
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ArtifactsBucket
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY

  # S3 Bucket for Artifact Content Storage
  ArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "ece461-artifacts-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/"
  
  ArtifactsBucketName:
    Description: "S3 bucket name for artifact content"
    Value: !Ref ArtifactsBucket
    Export:
      Name: !Sub "${AWS::StackName}-ArtifactsBucket"