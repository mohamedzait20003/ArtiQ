<!-- Global Navbar -->
<nav class="fixed top-0 left-0 right-0 bg-white border-b border-gray-200 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <!-- Logo -->
      <div class="flex items-center space-x-8">
        <a routerLink="/" class="flex items-center space-x-2">
          <div class="w-8 h-8 bg-linear-to-br from-yellow-400 via-orange-500 to-pink-500 rounded-lg flex items-center justify-center">
            <span class="text-white font-bold text-lg">AI</span>
          </div>
          <span class="text-xl font-bold text-gray-900">ModelHub</span>
        </a>
        
        <!-- Main Nav Links -->
        <div class="hidden md:flex space-x-6">
          <a href="#models" class="text-gray-700 hover:text-gray-900 font-medium transition">Models</a>
          <a href="#datasets" class="text-gray-700 hover:text-gray-900 font-medium transition">Datasets</a>
          <a href="#spaces" class="text-gray-700 hover:text-gray-900 font-medium transition">Spaces</a>
          <a href="#docs" class="text-gray-700 hover:text-gray-900 font-medium transition">Docs</a>
          <a routerLink="/dashboard" class="text-gray-700 hover:text-gray-900 font-medium transition">Dashboard</a>
        </div>
      </div>

      <!-- Search Bar (Desktop) -->
      <div class="hidden lg:flex flex-1 max-w-md mx-8">
        <div class="relative w-full">
          <input 
            [(ngModel)]="headerSearch"
            (ngModelChange)="onSearch($event)"
            (keyup.enter)="onEnter()"
            type="text" 
            placeholder="Search models, datasets, users..." 
            class="w-full px-4 py-2 pl-10 pr-4 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-500 focus:border-transparent"
          />
          <svg class="absolute left-3 top-2.5 h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
        </div>
      </div>

      <!-- Right Side Actions -->
      <div class="flex items-center space-x-4">
        <a routerLink="/auth/login" class="hidden sm:block text-gray-700 hover:text-gray-900 font-medium transition">
          Sign in
        </a>
        <a routerLink="/auth/register" class="px-4 py-2 bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-semibold rounded-lg transition shadow-sm">
          Sign up
        </a>
      </div>
    </div>
  </div>
</nav>

<!-- Main Content Area with top padding for fixed navbar -->
<div class="pt-16">
  <router-outlet></router-outlet>
</div>
